<!-- patientAppointment.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo/logo.png">
  <title>Patient Appointments</title>

  <link rel="stylesheet" href="../assets/css/adminDashboard.css">
  <link rel="stylesheet" href="../assets/css/doctorDashboard.css">
  <link rel="stylesheet" href="../assets/css/style.css">

  <script type="module" src="../js/render.js" defer></script>
  <script type="module" src="../js/util.js" defer></script>
  <script type="module" src="../js/components/header.js" defer></script>
  <script type="module" src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/patientAppointment.js" defer></script>
</head>

<body>

<div class="container">
  <div class="wrapper">

    <div id="header"></div>

    <div class="main-content">

      <h2>Patient <span>Appointments</span></h2>

      <input
              type="text"
              id="searchAppointment"
              class="searchBar"
              placeholder="Search doctor by name..."
      >

      <div class="filter-wrapper">
        <select class="filter-select" id="statusFilter">
          <option value="all">All Appointments</option>
          <option value="booked">Booked</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <table id="patientTable">
        <thead class="table-header">
        <tr>
          <th>Appointment ID</th>
          <th>Doctor Name</th>
          <th>Date</th>
          <th>Time</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>

        <tbody id="appointmentTableBody">
        <!-- rows inserted by JS -->
        </tbody>
      </table>

    </div>

    <div id="footer"></div>

  </div>
</div>

</body>
</html>
